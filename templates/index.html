<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MİKO - Selmanın Asistanı</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #e9e9f1;
            color: #cf2b2b;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: linear-gradient(135deg, #6c63ff, #3b82f6);
            padding: 16px 20px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        #sohbet-alani {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .mesaj {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .kullanici {
            background: linear-gradient(135deg, #6c63ff, #3b82f6);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .asistan {
            background: #1e1e2e;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid #2e2e4e;
        }
        .yazıyor {
            background: #1e1e2e;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid #2e2e4e;
            color: #888;
            font-style: italic;
        }
        #alt-panel {
            background: #1a1a2e;
            padding: 12px 16px;
            border-top: 1px solid #2e2e4e;
        }
        #sesli-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            font-size: 13px;
            color: #aaa;
        }
        .toggle-btn {
            width: 44px;
            height: 24px;
            background: #443939;
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            transition: background 0.3s;
        }
        .toggle-btn.aktif { background: #6c63ff; }
        .toggle-btn::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            top: 3px;
            left: 3px;
            transition: left 0.3s;
        }
        .toggle-btn.aktif::after { left: 23px; }
        #giris-satiri {
            display: flex;
            gap: 8px;
        }
        #mesaj-input {
            flex: 1;
            background: #0f0f1a;
            border: 1px solid #2e2e4e;
            border-radius: 24px;
            padding: 12px 18px;
            color: white;
            font-size: 15px;
            outline: none;
        }
        #mesaj-input:focus { border-color: #6c63ff; }
        .btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.1); }
        #gonder-btn { background: linear-gradient(135deg, #6c63ff, #3b82f6); }
        #mikrofon-btn { background: #1e1e2e; border: 1px solid #2e2e4e; }
        #mikrofon-btn.dinliyor { background: #ef4444; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        #temizle-btn {
            background: none;
            border: none;
            color: #666;
            font-size: 12px;
            cursor: pointer;
            text-align: center;
            width: 100%;
            margin-top: 8px;
        }
        #temizle-btn:hover { color: #aaa; }
    </style>
</head>
<body>
    <header>🤖 MİKO - Selmanın Asistanı</header>

    <div id="sohbet-alani">
        <div class="mesaj asistan">Merhaba! Ben senin yapay zeka asistanınım. Sana nasıl yardımcı olabilirim? 😊</div>
    </div>

    <div id="alt-panel">
        <div id="sesli-toggle">
            <div class="toggle-btn" id="toggle" onclick="sesliToggle()"></div>
            <span id="toggle-yazi">Sesli cevap kapalı</span>
        </div>
        <div id="giris-satiri">
            <button class="btn" id="mikrofon-btn" onclick="mikrofon()">🎤</button>
            <input type="text" id="mesaj-input" placeholder="Bir şey sor..." onkeypress="enterKontrol(event)">
            <button class="btn" id="gonder-btn" onclick="gonder()">➤</button>
        </div>
        <button id="temizle-btn" onclick="temizle()">🗑️ Sohbeti temizle</button>
    </div>

    <script>
        let sesliAktif = false;
        let dinliyor = false;
        let recognition = null;

        function sesliToggle() {
            sesliAktif = !sesliAktif;
            const toggle = document.getElementById("toggle");
            const yazi = document.getElementById("toggle-yazi");
            toggle.classList.toggle("aktif", sesliAktif);
            yazi.textContent = sesliAktif ? "Sesli cevap açık 🔊" : "Sesli cevap kapalı";
        }

        function enterKontrol(e) {
            if (e.key === "Enter") gonder();
        }

        function mesajEkle(icerik, tip) {
            const alan = document.getElementById("sohbet-alani");
            const div = document.createElement("div");
            div.className = `mesaj ${tip}`;
            div.textContent = icerik;
            alan.appendChild(div);
            alan.scrollTop = alan.scrollHeight;
            return div;
        }

        async function gonder() {
            const input = document.getElementById("mesaj-input");
            const mesaj = input.value.trim();
            if (!mesaj) return;

            mesajEkle(mesaj, "kullanici");
            input.value = "";

            const yaziyorDiv = mesajEkle("Yazıyor...", "yazıyor");

            const res = await fetch("/sohbet", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ mesaj, sesli: sesliAktif })
            });

            const data = await res.json();
            yaziyorDiv.remove();
            mesajEkle(data.cevap, "asistan");

            if (sesliAktif && data.ses) {
                const audio = new Audio("data:audio/mp3;base64," + data.ses);
                audio.play();
            }
        }

        function mikrofon() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                alert("Tarayıcın ses tanımayı desteklemiyor. Chrome kullan.");
                return;
            }

            const btn = document.getElementById("mikrofon-btn");

            if (dinliyor) {
                recognition.stop();
                return;
            }

            recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = "tr-TR";
            recognition.interimResults = false;

            recognition.onstart = () => {
                dinliyor = true;
                btn.classList.add("dinliyor");
                btn.textContent = "⏹";
            };

            recognition.onresult = (e) => {
                const metin = e.results[0][0].transcript;
                document.getElementById("mesaj-input").value = metin;
                gonder();
            };

            recognition.onend = () => {
                dinliyor = false;
                btn.classList.remove("dinliyor");
                btn.textContent = "🎤";
            };

            recognition.start();
        }

        async function temizle() {
            await fetch("/temizle", { method: "POST" });
            const alan = document.getElementById("sohbet-alani");
            alan.innerHTML = '<div class="mesaj asistan">Sohbet temizlendi. Yeni bir konuya başlayalım! 😊</div>';
        }
    </script>
</body>
</html>
